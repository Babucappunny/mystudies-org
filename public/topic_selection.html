<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vidya - Topic Selection</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app">
    <div class="app-header" id="chapter-title">Chapter</div>
    <div class="app-subheader">Choose Your Section</div>
    <div class="app-body" id="body">
        <div class="difficulty-wrap">
            <span>1</span>
            <input type="range" id="difficulty" min="1" max="5" value="5" step="1">
            <span id="difficulty-max">5</span>
        </div>
        <div id="section-list" class="loading">Loading sections...</div>
    </div>
    <div class="app-footer">
        <button class="btn secondary" id="btn-home">Home</button>
        <button class="btn" id="btn-ok" disabled>OK</button>
    </div>
</div>
<script src="/static/js/common.js"></script>
<script src="/static/js/topic.js"></script>
</body>
</html>
